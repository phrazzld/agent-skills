# Spellbook Registry — external skill sources for embeddings and on-demand pull.
#
# Skills and agents are discovered from the filesystem (skills/*/SKILL.md,
# agents/*.md). This file lists third-party sources that feed:
#   1. scripts/sync-external.sh  → installs into skills/.external/<alias>/
#   2. scripts/generate-embeddings.py  → builds the semantic search index
#
# Schema (per source):
#   repo:          <org>/<repo>          required. GitHub path.
#   default:       true                  optional. Marks the local repo (skipped by sync).
#   ref:           main | v1.2 | <sha>   default "main". Intent (branch/tag/sha).
#   pin:           <full-sha>            optional. Locks to an immutable sha.
#                                        Preferred. Enforced by sync unless allow_floating.
#   skills_path:   <dir>                 default ".". Sparse path under the repo
#                                        where SKILL.md dirs live.
#   layout:        flat | multi-root     advisory (used by embeddings). flat = one
#                                        SKILL.md per subdir of skills_path.
#   include:       [name, name, …]       optional allowlist of skill dir names.
#   exclude:       [name, name, …]       optional blocklist.
#   alias_prefix:  "prefix-"             REQUIRED for non-default sources. Prepended
#                                        to every alias to avoid cross-source
#                                        collisions. Convention: short source tag
#                                        (e.g. "anthropic-", "gstack-", "vercel-").
#   allow_floating: true                 optional. Permit a non-immutable ref
#                                        (main/HEAD/branch). Default: refuse.
#   embeddings:    true | false          default true. Include in embeddings index.
#   active:        true | false          default true. false = declared but skipped
#                                        by sync-external.sh. Use for "defer" sources.
#
# ALIAS_PREFIX DOCTRINE
# Every non-default source MUST declare alias_prefix. External libraries have
# heterogeneous naming conventions and silent collisions are load-bearing bugs.
# The prefix scopes the source's namespace: e.g. gstack's `office-hours` becomes
# `gstack-office-hours`, invoked as `/gstack-office-hours`. Two sources may share
# a prefix only if their skill name sets are provably disjoint (e.g. the two
# vercel-labs repos share `vercel-`). Same prefix + same skill name = fatal at sync.

sources:
  - repo: phrazzld/spellbook
    default: true
    layout: flat
    skills_path: skills

  # Anthropic official skills. Curate via include/exclude per workflow need.
  # Keep frontend-design synced locally so Codex/Pi and repo-local bridges can
  # consume the same design primitive as Claude.
  - repo: anthropics/skills
    ref: main
    layout: flat
    skills_path: skills
    alias_prefix: "anthropic-"
    allow_floating: true  # TODO: pin after first successful sync writes resolved sha here.

  # Vercel Labs curated agent skills — React / web-design primitives.
  - repo: vercel-labs/agent-skills
    ref: main
    layout: flat
    skills_path: skills
    alias_prefix: "vercel-"
    include:
      - react-best-practices
      - web-design-guidelines
      - react-native-skills
      - react-view-transitions
      - composition-patterns
    allow_floating: true  # TODO: pin after first sync.

  # Vercel Labs agent-browser — browser automation primitives.
  # Shares alias_prefix "vercel-" with agent-skills; skill names are disjoint.
  - repo: vercel-labs/agent-browser
    ref: main
    pin: 4cc6ca40b76a590bb06d1ec5abc16d27bb7d43c0
    layout: flat
    skills_path: skills
    alias_prefix: "vercel-"
    include: [agent-browser]

  # Same repo, second entry — `dogfood` skill lives under `skill-data/`, not
  # `skills/`. sync-external.sh only scans one path per entry, so we split.
  - repo: vercel-labs/agent-browser
    ref: main
    pin: 4cc6ca40b76a590bb06d1ec5abc16d27bb7d43c0
    layout: flat
    skills_path: skill-data
    alias_prefix: "vercel-"
    include: [dogfood]

  # JuliusBrussee/caveman — terse-output token compression ("few token do trick").
  # Sibling skills (caveman-commit, caveman-review, compress) intentionally
  # omitted; the base `caveman` skill is the high-leverage one. Revisit if
  # the others accrete evidence.
  - repo: JuliusBrussee/caveman
    ref: main
    pin: c2ed24b3e5d412cd0c25197b2bc9af587621fd99
    layout: flat
    skills_path: skills
    alias_prefix: "julius-"
    include: [caveman]

  # Gary Tan's gstack — dialectical product/planning skills (YC-partner style).
  #
  # CONTAINMENT CAVEAT: gstack hardcodes `~/.claude/skills/gstack/bin/...` in
  # ~1,400 places and expects a global `gstack` CLI install via `bin/setup`.
  # Skills NOT in the include list below depend on that bin/ infrastructure
  # (browse daemon, Chromium extension, QA runners) and will silently no-op
  # when copied to .external/ without the native install. The included subset
  # is prose-heavy; bin/ failures are swallowed in non-critical paths.
  #
  # For the doctrine-critical patterns (plan-ceo-review, office-hours), see
  # the spellbook-native reimplementations at skills/ceo-review/ and
  # skills/office-hours/ — those are the canonical versions. These gstack-*
  # aliases preserve Gary's originals for cross-reference and comparison.
  - repo: garrytan/gstack
    ref: main
    pin: b805aa0113040fb78228068ce808772299caf244
    layout: flat
    skills_path: .
    alias_prefix: "gstack-"
    include:
      - plan-ceo-review
      - office-hours
      - autoplan
      - investigate
      - retro
      - review
      - checkpoint
      - learn
      - cso
      - plan-design-review
      - plan-devex-review
      - plan-eng-review
      - document-release
      - design-consultation
      - design-html

  # OpenAI .curated — skip SaaS-credentialed skills unless the operator uses them.
  - repo: openai/skills
    ref: main
    layout: flat
    skills_path: skills/.curated
    alias_prefix: "openai-"
    exclude:
      - figma
      - linear
      - notion
      - sentry
      - vercel
      - cloudflare
    allow_floating: true  # TODO: pin after first sync.

  # forrestchang/andrej-karpathy-skills — community compilation of Karpathy's
  # Twitter observations on LLM coding pitfalls: four principles (surface
  # assumptions, simplicity first, surgical changes, goal-driven execution).
  # Canonical distillation lives in-tree at skills/karpathy-guidelines/ —
  # this registry entry exists so embeddings index the upstream repo and
  # surface it alongside the native version on semantic search.
  - repo: forrestchang/andrej-karpathy-skills
    ref: main
    layout: flat
    skills_path: skills
    alias_prefix: "karpathy-"
    allow_floating: true  # TODO: pin after first sync.

  # jakubkrehel/make-interfaces-feel-better — design-engineering skill for UI
  # polish. Encodes 16 specific techniques (concentric border radius, optical
  # alignment, layered shadows, interruptible animations, scale-on-press 0.96,
  # tabular nums, image outlines) with exact values, not hand-wavy guidance.
  # Based on Jakub Krehel's "Details that make interfaces feel better" article.
  #
  # LICENSE CAVEAT: no LICENSE file declared upstream as of pin sha. GitHub
  # public = viewable/forkable under GH terms; skills/.external/ is gitignored
  # (local cache, not redistribution). If we ever fork content into skills/
  # or redistribute, revisit — track a follow-up to request an upstream LICENSE.
  - repo: jakubkrehel/make-interfaces-feel-better
    ref: main
    pin: 384562064fcdd99778fcbafd8729626fe6aab02f
    layout: flat
    skills_path: skills
    alias_prefix: "jakub-"
    include: [make-interfaces-feel-better]

  # emilkowalski/skill — Emil Kowalski's "Agents with Taste" skill. Decision
  # flowcharts for easing selection, lookup tables for animation durations by
  # element type, typography / component rules drawn from Sonner and his
  # design-engineering articles. Complements jakubkrehel/make-interfaces-
  # feel-better: Jakub names specific techniques, Emil supplies the
  # when-to-use-which flowcharts. Both together form the motion-design
  # judgment layer.
  #
  # LICENSE CAVEAT: no LICENSE file declared upstream as of pin sha. Same
  # reasoning as jakubkrehel/make-interfaces-feel-better — local cache is
  # gitignored, not redistributed.
  #
  # NAMING NOTE: the single skill in this repo is named "emil-design-eng"
  # upstream, so the synced alias is `emil-emil-design-eng` (doubled "emil"
  # is cosmetic; keeping alias_prefix consistent with other author-scoped
  # sources is more important than visual tidiness).
  - repo: emilkowalski/skill
    ref: main
    pin: ecf66bbd1fb33c25332b6b0e454d08049978284c
    layout: flat
    skills_path: skills
    alias_prefix: "emil-"
    include: [emil-design-eng]

  # Leonxlnx/taste-skill — high-agency frontend design family. We keep the
  # output-enforcement helper out of the default sync because it is orthogonal
  # to UI taste; the rest of the set is directly relevant to frontend design.
  #
  # LICENSE CAVEAT: no LICENSE file declared upstream as of pin sha. Same
  # reasoning as other no-license externals above — local sync cache only.
  - repo: Leonxlnx/taste-skill
    ref: main
    pin: 7f1eb201552d02e8fd4651ec05bd31b7039a048e
    layout: flat
    skills_path: skills
    alias_prefix: "leon-"
    include:
      - brutalist-skill
      - gpt-tasteskill
      - images-taste-skill
      - minimalist-skill
      - redesign-skill
      - soft-skill
      - stitch-skill
      - taste-skill
